<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الموقع تحت التحديث</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    color:white;
    font-family:Tahoma, Arial, sans-serif;
}

.container{
    text-align:center;
    padding:40px;
}

.icon{
    font-size:70px;
    animation:float 2s ease-in-out infinite;
}

h1{
    margin:20px 0 10px;
    font-size:40px;
}

p{
    color:#cbd5e1;
    font-size:18px;
}

.loader{
    width:50px;
    height:50px;
    margin:30px auto 0;
    border:5px solid rgba(255,255,255,0.2);
    border-top:5px solid #38bdf8;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="icon">🚧</div>

    <h1>الموقع تحت التحديث</h1>

    <p>
        نعمل حالياً على تطوير الموقع وتحسين خدماتنا.<br>
        سنعود إليكم قريباً.
    </p>

    <div class="loader"></div>
</div>

</body>
</html>
