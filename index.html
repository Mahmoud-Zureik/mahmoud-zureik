<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الموقع تحت التحديث</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Tahoma, Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        text-align: center;
    }

    .box {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
        max-width: 500px;
        width: 90%;
    }

    .icon {
        font-size: 70px;
        margin-bottom: 20px;
    }

    h1 {
        margin: 0;
        font-size: 35px;
    }

    p {
        margin-top: 15px;
        font-size: 18px;
        line-height: 1.8;
    }
</style>
</head>

<body>

<div class="box">
    <div class="icon">🔧</div>
    <h1>الموقع تحت التحديث الآن</h1>
    <p>
        نعمل حالياً على تحسين الموقع وإضافة مزايا جديدة.<br>
        يرجى العودة لاحقاً، شكراً لتفهمكم.
    </p>
</div>

</body>
</html>
