name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create APK
        run: |
          mkdir apk
          cp -r * apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apk
